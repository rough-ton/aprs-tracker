services:
  aprs-tracker:
    build: .
    container_name: aprs-tracker
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - APRS_FI_API_KEY=${APRS_FI_API_KEY}
      - PORT=5050
      - FLASK_DEBUG=0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s