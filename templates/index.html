<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>APRS Tracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><!--Font Awesome Free 6.5.2 tower-broadcast path--><rect width='512' height='512' rx='100' fill='%230ea5e9'/><path fill='white' d='M192 0C147.8 0 112 35.8 112 80s35.8 80 80 80s80-35.8 80-80S236.2 0 192 0zM38.4 180.8C14.9 210.2 0 247.5 0 288c0 47.1 19.1 89.7 49.9 120.6L73.4 385c-23.1-24.3-37.4-57-37.4-93c0-30.2 9.9-58.1 26.5-80.7l-24.1-30.5zM345.6 180.8l-24.1 30.5C338.1 233.9 348 261.8 348 292c0 36-14.3 68.7-37.4 93l23.5 23.6C364.9 377.7 384 335.1 384 288c0-40.5-14.9-77.8-38.4-107.2zM112.6 219.7C97.1 238.6 88 262.3 88 288c0 33.5 13.8 63.8 35.9 85.6L147.4 350c-15.4-15.6-24.9-37-24.9-61.9c-.1-19.8 6.5-38 17.3-52.7l-27.2-15.7zM271.4 219.7l-27.2 15.6c10.8 14.7 17.3 32.9 17.3 52.7c0 24.9-9.5 46.3-24.9 61.9l23.5 23.6C282.2 351.8 296 321.5 296 288c0-25.7-9.1-49.4-24.6-68.3zM192 240c-26.5 0-48 21.5-48 48s21.5 48 48 48s48-21.5 48-48s-21.5-48-48-48zM168 416v96h48V416h-48z'/></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="header-title">
          <i class="fa-solid fa-tower-broadcast header-icon"></i>
          <span>APRS Tracker</span>
        </div>
        <button id="btn-settings" class="icon-btn" aria-label="Settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
      </div>
    </header>

    <!-- Callsign input bar -->
    <section class="search-bar">
      <div class="search-inner">
        <input
          id="input-callsigns"
          type="text"
          placeholder="KF0WMG, W1AW, ..."
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          aria-label="Enter callsigns separated by commas"
        />
        <button id="btn-lookup" class="btn-primary">Look up</button>
      </div>
      <div id="search-hint" class="search-hint">Enter one or more callsigns, comma-separated</div>
    </section>

    <!-- Tab bar -->
    <nav class="tab-bar" role="tablist">
      <button class="tab active" data-tab="map" role="tab" aria-selected="true">Map</button>
      <button class="tab" data-tab="history" role="tab" aria-selected="false">History</button>
      <button class="tab" data-tab="weather" role="tab" aria-selected="false">Weather</button>
    </nav>

    <!-- Main content area -->
    <main class="content-area">

      <!-- MAP TAB -->
      <div id="tab-map" class="tab-pane active">
        <div class="layer-switcher" role="group" aria-label="Map layer">
          <button class="layer-btn active" data-layer="osm"><i class="fa-solid fa-road"></i> Streets</button>
          <button class="layer-btn" data-layer="satellite"><i class="fa-solid fa-satellite"></i> Satellite</button>
          <button class="layer-btn" data-layer="topo"><i class="fa-solid fa-mountain"></i> Topo</button>
          <!-- <button class="layer-btn" data-layer="voyager"><i class="fa-solid fa-map"></i> Voyager</button> -->
        </div>
        <div id="map"></div>
        <div id="station-cards" class="station-cards"></div>
      </div>

      <!-- HISTORY TAB -->
      <div id="tab-history" class="tab-pane">
        <div class="history-controls">
          <label for="history-callsign-select">Callsign</label>
          <select id="history-callsign-select">
            <option value="">-- look up callsigns first --</option>
          </select>
          <button id="btn-load-history" class="btn-secondary">Load history</button>
        </div>
        <div id="history-map"></div>
        <div id="history-list" class="history-list"></div>
      </div>

      <!-- WEATHER TAB -->
      <div id="tab-weather" class="tab-pane">
        <div id="weather-cards" class="weather-cards">
          <div class="empty-state">Look up callsigns to see weather telemetry.</div>
        </div>
      </div>

    </main>

    <!-- Settings drawer -->
    <div id="settings-drawer" class="settings-drawer" hidden>
      <div class="drawer-header">
        <span>Settings</span>
        <button id="btn-close-settings" class="icon-btn" aria-label="Close settings"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="drawer-body">
        <label class="setting-row">
          <span>Auto-refresh</span>
          <input type="checkbox" id="setting-autorefresh" />
        </label>
        <label class="setting-row">
          <span>Refresh interval (s)</span>
          <input type="number" id="setting-interval" value="60" min="15" max="300" />
        </label>
        <label class="setting-row">
          <span>Units</span>
          <select id="setting-units">
            <option value="metric">Metric (km/h, °C)</option>
            <option value="imperial">Imperial (mph, °F)</option>
          </select>
        </label>
        <label class="setting-row">
          <span>Saved callsigns</span>
          <input type="text" id="setting-saved" placeholder="KF0WMG, W1AW" />
        </label>
        <button id="btn-save-settings" class="btn-primary" style="margin-top:12px;width:100%">Save</button>
      </div>
    </div>
    <div id="settings-overlay" class="overlay" hidden></div>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="footer-left">
        <span>&copy; 2025 <a href="https://github.com/rough-ton/aprs-tracker" target="_blank" rel="noopener">rough-ton</a></span>
      </div>
      <div class="footer-right">
        <span class="footer-version">{{ build_version }}</span>
      </div>
    </footer>

    <!-- Toast notification -->
    <div id="toast" class="toast" role="alert" aria-live="polite"></div>

    <!-- Loading indicator -->
    <div id="loading" class="loading" hidden>
      <div class="spinner"></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
